apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: agent-knowledge-api
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.staging.agennext.com
      - op: replace
        path: /spec/rules/1/host
        value: dashboard.staging.agennext.com
    target:
      kind: Ingress
      name: agent-platform-ingress
