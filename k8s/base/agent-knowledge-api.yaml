apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-knowledge-api
  namespace: agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-knowledge-api
  template:
    metadata:
      labels:
        app: agent-knowledge-api
    spec:
      containers:
        - name: agent-knowledge-api
          image: ghcr.io/agennext/agent-knowledge-api:latest
          ports:
            - containerPort: 8001
          env:
            - name: SURREALDB_URL
              value: ws://surrealdb:8000/rpc
            - name: SURREALDB_NAMESPACE
              value: agent_platform
            - name: SURREALDB_DATABASE
              value: agent_platform
            - name: SURREALDB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secret
                  key: username
            - name: SURREALDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secret
                  key: password
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: agent-knowledge-api
  namespace: agent-platform
spec:
  selector:
    app: agent-knowledge-api
  ports:
    - port: 8001
      targetPort: 8001
