apiVersion: apps/v1
kind: Deployment
metadata:
  name: surrealdb
  namespace: agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: surrealdb
  template:
    metadata:
      labels:
        app: surrealdb
    spec:
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:latest
          args: ["start", "--log", "info", "--user", "$(SURREALDB_USER)", "--pass", "$(SURREALDB_PASS)", "file:/data/surreal.db"]
          ports:
            - containerPort: 8000
          env:
            - name: SURREALDB_USER
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secret
                  key: username
            - name: SURREALDB_PASS
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secret
                  key: password
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: surrealdb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: agent-platform
spec:
  selector:
    app: surrealdb
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: surrealdb-pvc
  namespace: agent-platform
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
