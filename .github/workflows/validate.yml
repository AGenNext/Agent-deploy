name: Validate Agent-deploy

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  validate-release-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate CreativeWork release contract
        run: python scripts/validate_release_contract.py
