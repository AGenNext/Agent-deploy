name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod]
      version:
        description: Image tag / version to deploy
        required: true

jobs:
  gate:
    name: Deployment gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyyaml requests

      - name: Run deployment gate
        run: python scripts/deployment_gate.py --env ${{ inputs.environment }} --version ${{ inputs.version }}

  build:
    name: Build images
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agent-knowledge-api
        run: |
          docker build \
            -t ghcr.io/agennext/agent-knowledge-api:${{ inputs.version }} \
            -f services/agent-knowledge-api/Dockerfile \
            services/agent-knowledge-api/
        working-directory: ${{ github.workspace }}

  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Apply K8s manifests
        run: |
          kubectl apply -k k8s/overlays/${{ inputs.environment }}
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/agent-knowledge-api -n agent-platform --timeout=300s
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

  smoke-test:
    name: Post-deploy smoke test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: python scripts/smoke_test.py --env ${{ inputs.environment }}

  rollback:
    name: Rollback on failure
    needs: [deploy, smoke-test]
    if: failure()
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Rollback deployment
        run: |
          kubectl rollout undo deployment/agent-knowledge-api -n agent-platform
          kubectl rollout undo deployment/agent-dashboard -n agent-platform
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      - name: Notify rollback
        run: echo "Deployment rolled back for ${{ inputs.environment }} at $(date)"
